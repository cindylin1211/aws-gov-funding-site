<!DOCTYPE html>
<html>
<head>
    <title>Test API</title>
</head>
<body>
    <h1>Testing DynamoDB API</h1>
    <button onclick="testAPI()">Test API</button>
    <pre id="result"></pre>
    
    <script>
        async function testAPI() {
            try {
                const response = await fetch('https://03rc0jt6dg.execute-api.us-west-2.amazonaws.com/prod/grants');
                const data = await response.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
                console.log('API Response:', data);
                console.log('First grant:', data.grants[0]);
                console.log('參考資料 type:', typeof data.grants[0].參考資料);
                console.log('參考資料 value:', data.grants[0].參考資料);
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
